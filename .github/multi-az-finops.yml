name: "Infrastructure Multi-AZ & Audit FinOps"

on:
  push:
    branches:
      - main
    paths:
      - 'multi-az-infra/**'

jobs:
  terraform-finops:
    name: "Déploiement Terraform et Analyse de Coûts"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Configuration de Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Initialisation Terraform
        run: terraform init
        working-directory: ./multi-az-infra

      - name: Installation et Exécution d'Infracost
        run: |
          curl -fsSL https://raw.githubusercontent.com/infracost/infracost/master/scripts/install.sh | sh
          infracost breakdown --path ./multi-az-infra
        env:
          INFRACOST_API_KEY: ${{ secrets.INFRACOST_API_KEY }}

      - name: Planification Terraform
        run: terraform plan
        working-directory: ./multi-az-infra
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
