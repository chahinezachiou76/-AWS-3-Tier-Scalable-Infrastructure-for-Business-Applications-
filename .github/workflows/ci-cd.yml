name: Simple CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Show files
        run: ls

      - name: Build Docker Image
        run: docker build -t myapp .

      - name: Run container
        run: docker run myapp
